# Registry for spatial training — fill in exact URLs after you accept each site's terms.
# Priority: 10x Visium (labeled / rich metadata) -> Stereo-seq brain -> Dryad MERFISH (transfer).

cohorts:
  - id: tenx_visium_breast
    platform: 10x_visium
    source: 10x_genomics
    role: train_val
    notes: Search 10x Genomics resource datasets for Visium breast cancer; download full outs bundle.
    suggested_use: Sprint 1–2 primary; niche + QC baselines

  - id: tenx_visium_brain
    platform: 10x_visium
    source: 10x_genomics
    role: train_val
    notes: Human or mouse brain Visium for domain structure and subgroup metrics.
    suggested_use: Sprint 1–2; subgroup by structure/region if annotated

  - id: tenx_visium_hd
    platform: 10x_visium_hd
    source: 10x_genomics
    role: train_val
    notes: >
      Visium HD binned_outputs/square_*um with filtered_feature_bc_matrix + spatial/tissue_positions.parquet.
      Convert with ml/data_pack/visium_hd_square_to_h5ad.py; obs should include sample_id, slide_id, platform.
      Prefer coarser bins (e.g. square_016um) or API max_obs for interactive runs; full 008um slides are multi‑GB.
    suggested_use: Sprint 1–3; use subsampling or coarser binning for graph-heavy steps (see ml/spatial/PERFORMANCE.md)

  - id: stereo_seq_mouse_brain
    platform: stereo_seq
    source: cns_lifetech
    role: ood_test
    notes: High-resolution mouse brain from BGI Stereo-seq portal; harmonize coordinates to obsm spatial.
    suggested_use: Sprint 4 cross-platform benchmark vs 10x

  - id: dryad_merfish_transfer
    platform: merfish
    source: datadryad
    role: tech_transfer_test
    notes: Pick MERFISH datasets with published gene panel CSV + cell labels; expect panel mismatch vs Visium.
    suggested_use: Sprint 4 only after gene intersection mapping
